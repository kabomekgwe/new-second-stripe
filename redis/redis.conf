# Redis Configuration for Production
# This config is loaded when Redis starts with: redis-server /usr/local/etc/redis/redis.conf

# ============================================
# Memory Management
# ============================================
maxmemory 512mb
maxmemory-policy allkeys-lru

# ============================================
# Persistence (AOF)
# ============================================
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ============================================
# Security
# ============================================
# requirepass is set via Docker secrets in docker-compose.prod.yml

# Protected mode - require authentication
protected-mode yes

# ============================================
# Logging
# ============================================
loglevel notice
logfile ""

# ============================================
# Connection
# ============================================
bind 0.0.0.0
timeout 0
tcp-keepalive 300

# ============================================
# Performance
# ============================================
databases 1

# ============================================
# Snapshotting (RDB) - Backup every 15 minutes if at least 1 change
# ============================================
save 900 1
save 300 10
save 60 10000

# ============================================
# Disable dangerous commands (optional for extra security)
# ============================================
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG "CONFIG_a1b2c3"
