services:
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: app_user
      APP_USER_PASSWORD: app_password
    volumes:
      - oracledata:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  core-backend:
    build:
      context: .
      dockerfile: core-backend/Dockerfile
    ports:
      - "4917:4917"
    environment:
      PORT: 4917
      DB_HOST: oracle
      DB_PORT: 1521
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_SERVICE_NAME: FREEPDB1
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: dev-session-secret-change-in-prod
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxx}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_xxx}
      STRIPE_BILLING_PRODUCT_ID: ${STRIPE_BILLING_PRODUCT_ID:-prod_xxx}
      FRONTEND_URL: http://localhost:3000
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:4917/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy

  webhooks-backend:
    build:
      context: .
      dockerfile: webhooks-backend/Dockerfile
    ports:
      - "4923:4923"
    environment:
      PORT: 4923
      DB_HOST: oracle
      DB_PORT: 1521
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_SERVICE_NAME: FREEPDB1
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxx}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_xxx}
      RESEND_API_KEY: ${RESEND_API_KEY:-resend_dev_key}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-billing@yourdomain.com}
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:4923/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      oracle:
        condition: service_healthy

volumes:
  oracledata:
  redisdata:
